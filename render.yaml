services:
  # ── Backend (FastAPI + EfficientNet-B4) ──────────────────────────────────────
  - type: web
    name: deepfake-detector-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /api/health

    envVars:
      - key: USE_MOCK_MODEL
        value: "false"
      - key: MODEL_PATH
        value: ./weights/best_model.pth
      - key: HF_MODEL_REPO
        value: Yashikaysn29/deepshield
      - key: HF_MODEL_FILE
        value: best_model.pth
      - key: MAX_UPLOAD_SIZE_MB
        value: "10"
      - key: RATE_LIMIT_PER_MINUTE
        value: "10"
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./data/history.db
      - key: HEATMAP_STORAGE_PATH
        value: ./data/heatmaps
      # Set this after deploying the frontend — paste your Vercel URL here:
      - key: CORS_ORIGINS
        value: https://deepfake-detector.vercel.app,http://localhost:5173
